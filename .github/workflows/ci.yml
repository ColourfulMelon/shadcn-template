name: CI

on:
  push:
    branches:
      - master
      - "renovate/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Code quality
        run: pnpm check:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
