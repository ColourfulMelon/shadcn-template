# pnpm reads project settings from here (pnpm >= 10.16), not the package.json "pnpm" field.
# Approve sharp's native install/build script for Next.js image optimization. Without
# approval, pnpm 11 fails installs with ERR_PNPM_IGNORED_BUILDS. pnpm 11 uses `allowBuilds`;
# pnpm 10 (CI) uses `onlyBuiltDependencies`, so both are declared for cross-version
# compatibility.
# Delay newly published packages for seven days (the value is in minutes).
minimumReleaseAge: 0
allowBuilds:
  sharp: true
onlyBuiltDependencies:
  - sharp
